name: slo-tech delo monitor

on:
  # Every 4 hours at :06 past the hour (00:06, 04:06, ... 20:06 UTC).
  # The :06 offset dodges the top-of-the-hour congestion on GitHub's shared
  # cron scheduler, which can otherwise delay queued runs by hours. Cron is
  # UTC-only so local clock times shift by an hour across DST, but at a
  # 4-hourly cadence that's irrelevant.
  schedule:
    - cron: "6 */4 * * *"
  workflow_dispatch:

permissions:
  contents: write

# Serialize runs so a manual workflow_dispatch overlapping with the cron
# can't race the state.json push (and double-email).
concurrency:
  group: monitor-state
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          # Full history so the rebase retry below survives any unusual
          # concurrent-push scenario.
          fetch-depth: 0

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run monitor
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          NOTIFY_TO: ${{ secrets.NOTIFY_TO }}
        run: python monitor.py

      - name: Commit state changes
        run: |
          if [[ -z "$(git status --porcelain state.json)" ]]; then
            echo "No state changes to commit."
            exit 0
          fi
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add state.json
          git commit -m "chore: update state.json [skip ci]"
          for attempt in 1 2 3; do
            if git push; then
              exit 0
            fi
            if [ "$attempt" -lt 3 ]; then
              echo "Push attempt $attempt failed; rebasing on remote and retrying..." >&2
              if ! git pull --rebase origin "${GITHUB_REF_NAME}"; then
                echo "Rebase failed; cannot retry push." >&2
                exit 1
              fi
            fi
          done
          echo "All push attempts failed." >&2
          exit 1
