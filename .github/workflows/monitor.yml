name: slo-tech delo monitor

on:
  # Every 4 hours at :06 past the hour (00:06, 04:06, ... 20:06 UTC).
  # The :06 offset dodges the top-of-the-hour congestion on GitHub's shared
  # cron scheduler, which can otherwise delay queued runs by hours. Cron is
  # UTC-only so local clock times shift by an hour across DST, but at a
  # 4-hourly cadence that's irrelevant.
  schedule:
    - cron: "6 */4 * * *"
  workflow_dispatch:

permissions:
  contents: write

# Serialize runs so a manual workflow_dispatch overlapping with the cron
# can't race the state.json push (and double-email).
concurrency:
  group: monitor-state
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          # Full history so the rebase retry below survives any unusual
          # concurrent-push scenario.
          fetch-depth: 0

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run monitor
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          NOTIFY_TO: ${{ secrets.NOTIFY_TO }}
        run: python monitor.py

      - name: Commit state changes
        run: |
          if [[ -z "$(git status --porcelain state.json)" ]]; then
            echo "No state changes to commit."
            exit 0
          fi
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # Preserve the freshly-generated state.json outside the repo so we can
          # re-apply it onto the latest remote tip if a concurrent push beats us.
          cp state.json "${RUNNER_TEMP}/state.json.new"

          for attempt in 1 2 3; do
            cp "${RUNNER_TEMP}/state.json.new" state.json
            git add state.json
            # Fold into the previous commit when it is already a state.json
            # chore commit, instead of stacking another identical one — this
            # keeps history from filling up with hundreds of "update state.json"
            # commits. Amending a commit that's already on the remote rewrites
            # it, so the push below must be a force push.
            if [[ "$(git log -1 --format=%s)" == "chore: update state.json"* ]]; then
              git commit --amend -m "chore: update state.json [skip ci]" --quiet
            else
              git commit -m "chore: update state.json [skip ci]" --quiet
            fi
            # --force-with-lease only overwrites the remote if it is still where
            # our remote-tracking ref expects — a concurrent human push breaks
            # the lease and is rejected (not clobbered), sending us to retry.
            if git push --force-with-lease; then
              exit 0
            fi
            if [ "$attempt" -lt 3 ]; then
              echo "Push attempt $attempt failed; resyncing to remote and retrying..." >&2
              if ! git fetch origin "${GITHUB_REF_NAME}"; then
                echo "Fetch failed; cannot retry push." >&2
                exit 1
              fi
              git reset --hard "origin/${GITHUB_REF_NAME}"
            fi
          done
          echo "All push attempts failed." >&2
          exit 1
