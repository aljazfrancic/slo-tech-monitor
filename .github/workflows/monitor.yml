name: slo-tech delo monitor

on:
  # 07:00 UTC daily.
  # Anchored to winter (CET, UTC+1) -> fires at 08:00 local Nov-Mar,
  # and at 09:00 local Apr-Oct due to CEST (UTC+2). GitHub Actions cron
  # has no DST awareness; change to "0 6 * * *" if you'd rather anchor
  # to summer time.
  schedule:
    - cron: "0 7 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run monitor
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          NOTIFY_TO: ${{ secrets.NOTIFY_TO }}
        run: python monitor.py

      - name: Commit state changes
        run: |
          if [[ -n "$(git status --porcelain state.json)" ]]; then
            git config user.name  "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add state.json
            git commit -m "chore: update state.json [skip ci]"
            git push
          else
            echo "No state changes to commit."
          fi
