name: slo-tech delo monitor

on:
  # 07:00 UTC daily.
  # Anchored to winter (CET, UTC+1) -> fires at 08:00 local from the last
  # Sun of Oct through the last Sun of Mar, and at 09:00 local for the rest
  # of the year due to CEST (UTC+2). GitHub Actions cron has no DST
  # awareness; change to "0 6 * * *" if you'd rather anchor to summer time.
  schedule:
    - cron: "0 7 * * *"
  workflow_dispatch:

permissions:
  contents: write

# Serialize runs so a manual workflow_dispatch overlapping with the cron
# can't race the state.json push (and double-email).
concurrency:
  group: monitor-state
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          # Full history so the rebase retry below survives any unusual
          # concurrent-push scenario.
          fetch-depth: 0

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run monitor
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          NOTIFY_TO: ${{ secrets.NOTIFY_TO }}
        run: python monitor.py

      - name: Commit state changes
        run: |
          if [[ -z "$(git status --porcelain state.json)" ]]; then
            echo "No state changes to commit."
            exit 0
          fi
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add state.json
          git commit -m "chore: update state.json [skip ci]"
          for attempt in 1 2 3; do
            if git push; then
              exit 0
            fi
            if [ "$attempt" -lt 3 ]; then
              echo "Push attempt $attempt failed; rebasing on remote and retrying..." >&2
              if ! git pull --rebase origin "${GITHUB_REF_NAME}"; then
                echo "Rebase failed; cannot retry push." >&2
                exit 1
              fi
            fi
          done
          echo "All push attempts failed." >&2
          exit 1
